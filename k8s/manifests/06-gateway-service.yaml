apiVersion: apps/v1
kind: Deployment
metadata:
  name: mafia-gateway-service
  namespace: mafia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mafia-gateway-service
  template:
    metadata:
      labels:
        app: mafia-gateway-service
    spec:
      initContainers:
        - name: wait-for-temporal
          image: busybox
          command: ['sh', '-c', 'until nc -z temporal 7233; do echo waiting for temporal; sleep 3; done']
      containers:
        - name: mafia-gateway-service
          image: mafia-mafia-gateway-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: GATEWAY_HOST
              valueFrom:
                configMapKeyRef:
                  name: mafia-config
                  key: GATEWAY_HOST
            - name: GATEWAY_PORT
              valueFrom:
                configMapKeyRef:
                  name: mafia-config
                  key: GATEWAY_PORT
            - name: SPRING_ENGINE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: mafia-config
                  key: SPRING_ENGINE_BASE_URL
            - name: GIN_EVENT_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: mafia-config
                  key: GIN_EVENT_BASE_URL
            - name: TEMPORAL_HOST
              valueFrom:
                configMapKeyRef:
                  name: mafia-config
                  key: TEMPORAL_HOST
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mafia-secrets
                  key: INTERNAL_SERVICE_TOKEN
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mafia-secrets
                  key: JWT_SECRET
            - name: JWT_ALGORITHM
              valueFrom:
                secretKeyRef:
                  name: mafia-secrets
                  key: JWT_ALGORITHM
            - name: JWT_EXPIRES_MINUTES
              valueFrom:
                secretKeyRef:
                  name: mafia-secrets
                  key: JWT_EXPIRES_MINUTES
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: mafia-gateway-service
  namespace: mafia
spec:
  selector:
    app: mafia-gateway-service
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30000

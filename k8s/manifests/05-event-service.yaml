apiVersion: apps/v1
kind: Deployment
metadata:
  name: mafia-event-service
  namespace: mafia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mafia-event-service
  template:
    metadata:
      labels:
        app: mafia-event-service
    spec:
      initContainers:
        - name: wait-for-temporal
          image: busybox
          command: ['sh', '-c', 'until nc -z temporal 7233; do echo waiting for temporal; sleep 3; done']
      containers:
        - name: mafia-event-service
          image: mafia-mafia-event-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: EVENT_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: mafia-config
                  key: EVENT_SERVICE_PORT
            - name: EVENT_MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: mafia-config
                  key: SPRING_DATA_MONGODB_URI
            - name: MONGO_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mafia-config
                  key: MONGO_DATABASE
            - name: GATEWAY_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: mafia-config
                  key: GATEWAY_BASE_URL
            - name: TEMPORAL_HOST
              valueFrom:
                configMapKeyRef:
                  name: mafia-config
                  key: TEMPORAL_HOST
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mafia-secrets
                  key: INTERNAL_SERVICE_TOKEN
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: mafia-event-service
  namespace: mafia
spec:
  selector:
    app: mafia-event-service
  ports:
    - port: 8081
      targetPort: 8081

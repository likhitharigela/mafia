apiVersion: apps/v1
kind: Deployment
metadata:
  name: mafia-frontend
  namespace: mafia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mafia-frontend
  template:
    metadata:
      labels:
        app: mafia-frontend
    spec:
      containers:
        - name: mafia-frontend
          image: mafia-mafia-engine-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5173
          env:
            - name: VITE_GATEWAY_BASE_URL
              value: "http://127.0.0.1:65226"   # NodePort exposed on host

---
apiVersion: v1
kind: Service
metadata:
  name: mafia-frontend
  namespace: mafia
spec:
  selector:
    app: mafia-frontend
  type: NodePort
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30173
